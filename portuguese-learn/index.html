<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f766e" />
  <title>Falar — Learn Brazilian Portuguese</title>
  <meta name="description" content="Falar is a free, offline-friendly app for learning Brazilian Portuguese: vocabulary lessons with native-style audio, spaced-repetition flashcards, quizzes and verb conjugations. No account, no ads." />

  <!-- Emoji favicon (no asset files needed) -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%87%A7%F0%9F%87%B7%3C/text%3E%3C/svg%3E" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%87%A7%F0%9F%87%B7%3C/text%3E%3C/svg%3E" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Falar" />

  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-screen="home">

  <div id="app">
    <header class="topbar">
      <button id="back-btn" class="icon-btn" aria-label="Back" hidden>‹</button>
      <a class="brand" href="#/" aria-label="Falar home">
        <span class="brand-flag" aria-hidden="true">🇧🇷</span>
        <span class="brand-name">Falar</span>
      </a>
      <button id="sound-btn" class="icon-btn" aria-label="Mute audio">🔊</button>
    </header>

    <main id="screen" aria-live="polite"></main>

    <nav id="tabbar" class="tabbar" aria-label="Main">
      <a href="#/" data-tab="home" class="tab"><span class="tab-ic">🏠</span><span class="tab-lbl">Home</span></a>
      <a href="#/lessons" data-tab="lessons" class="tab"><span class="tab-ic">📚</span><span class="tab-lbl">Lessons</span></a>
      <a href="#/practice" data-tab="practice" class="tab"><span class="tab-ic">🎴</span><span class="tab-lbl">Practice</span></a>
      <a href="#/verbs" data-tab="verbs" class="tab"><span class="tab-ic">🔤</span><span class="tab-lbl">Verbs</span></a>
      <a href="#/search" data-tab="search" class="tab"><span class="tab-ic">🔎</span><span class="tab-lbl">Search</span></a>
    </nav>
  </div>

  <!-- celebration layer -->
  <div id="celebrate" aria-hidden="true"></div>

  <!-- scripts: helpers + engine first, then data, then screens, then router -->
  <script src="js/dom.js"></script>
  <script src="js/speech.js"></script>
  <script src="js/store.js"></script>
  <script src="js/data.js"></script>
  <script src="js/content.js"></script>
  <script src="js/components.js"></script>
  <script src="js/screens/home.js"></script>
  <script src="js/screens/lessons.js"></script>
  <script src="js/screens/lesson.js"></script>
  <script src="js/screens/practice.js"></script>
  <script src="js/screens/quiz.js"></script>
  <script src="js/screens/verbs.js"></script>
  <script src="js/screens/search.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
