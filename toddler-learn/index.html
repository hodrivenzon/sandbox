<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#ff8a3d" />
  <title>Tiny Explorers — Learning Fun for Ages 2–3</title>
  <meta name="description" content="A free, ad-free, offline-friendly learning playground for toddlers aged 2–3. Colors, shapes, numbers, animals, letters, music and more — in English or Hebrew, designed around early-childhood development research." />

  <!-- Emoji favicon (no asset files needed) -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%A7%B8%3C/text%3E%3C/svg%3E" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%A7%B8%3C/text%3E%3C/svg%3E" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Tiny Explorers" />

  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-theme="home" data-screen="home" data-lang="en">

  <div id="app">
    <header class="topbar">
      <button id="home-btn" class="icon-btn" aria-label="Home" hidden>🏠</button>
      <h1 id="screen-title" class="screen-title" data-i18n="appName">Tiny Explorers</h1>
      <button id="lang-btn" class="icon-btn" aria-label="Language">🌐</button>
      <button id="sound-btn" class="icon-btn" aria-label="Turn sound off">🔊</button>
    </header>
    <main id="screen" aria-live="polite"></main>
  </div>

  <!-- celebration / confetti layer -->
  <div id="celebrate" aria-hidden="true"></div>

  <!-- first-tap gate: pick a language + unlock audio (autoplay policy) -->
  <div id="start-overlay">
    <div class="start-card">
      <div class="logo">🧸</div>
      <h1 data-i18n="appName">Tiny Explorers</h1>
      <p data-i18n="tagline">Learning fun for ages 2–3</p>

      <p class="lang-label" data-i18n="chooseLang">Choose a language</p>
      <div class="lang-row">
        <button class="lang-choice" data-lang="en"><span>🇬🇧</span><span>English</span></button>
        <button class="lang-choice" data-lang="he"><span>🇮🇱</span><span>עברית</span></button>
      </div>

      <button id="start-btn" class="big-start" data-i18n="start">▶︎ Tap to Start</button>
      <p id="voice-note" class="voice-note" hidden></p>
    </div>
  </div>

  <!-- scripts: language + data + engine first, then screens, then the app/router -->
  <script src="js/i18n.js"></script>
  <script src="js/config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/activities/home.js"></script>
  <script src="js/activities/colors.js"></script>
  <script src="js/activities/shapes.js"></script>
  <script src="js/activities/numbers.js"></script>
  <script src="js/activities/animals.js"></script>
  <script src="js/activities/letters.js"></script>
  <script src="js/activities/music.js"></script>
  <script src="js/activities/match.js"></script>
  <script src="js/activities/body.js"></script>
  <script src="js/activities/draw.js"></script>
  <script src="js/activities/weather.js"></script>
  <script src="js/activities/bubblepop.js"></script>
  <script src="js/activities/peekaboo.js"></script>
  <script src="js/activities/soundmatch.js"></script>
  <script src="js/activities/settings.js"></script>
  <script src="js/activities/parents.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
